Hybrid perfomance for real humans.">

  <meta name="twitter:title" content="LIFTORY — Move. Lift. Live.">

  <meta name="twitter:description" content="Move better. Lift stronger. Live longer. Hybrid performance for real humans.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Nuke any existing service worker and caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) { reg.unregister(); });
        });
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) { caches.delete(key); });
          });
        }
      }

      // DevNav — only on localhost
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        document.addEventListener('DOMContentLoaded', function() {
          var pages = [
            ['/', 'Splash'],
            ['/welcome', 'Welcome'],
            ['/login', 'Login'],
            ['/onboarding', 'Onboarding'],
            ['/home', 'Home'],
            ['/workout/1', 'Workout'],
            ['/session', 'Session'],
            ['/progress', 'Progress'],
            ['/exercises', 'Exercises'],
            ['/profile', 'Profile'],
            ['/paywall', 'Paywall'],
            ['/program', 'Program'],
            ['/admin', 'Admin'],
          ];

          var nav = document.createElement('div');
          nav.id = 'dev-nav';
          nav.style.cssText = 'position:fixed;bottom:12px;right:12px;z-index:99999;font-family:monospace;font-size:11px;';

          var toggle = document.createElement('button');
          toggle.textContent = '⚡ Nav';
          toggle.style.cssText = 'background:#C75B39;color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:bold;font-size:12px;';
          nav.appendChild(toggle);

          var panel = document.createElement('div');
          panel.style.cssText = 'display:none;background:#1A1A1A;border:1px solid #333;border-radius:10px;padding:8px;margin-bottom:8px;max-height:60vh;overflow-y:auto;min-width:140px;';

          pages.forEach(function(p) {
            var btn = document.createElement('button');
            btn.textContent = p[1];
            btn.style.cssText = 'display:block;width:100%;text-align:left;background:none;border:none;color:#FAF8F5;padding:6px 10px;cursor:pointer;border-radius:6px;font-size:11px;font-family:monospace;';
            btn.addEventListener('mouseenter', function() { btn.style.background = '#333'; });
            btn.addEventListener('mouseleave', function() { btn.style.background = 'none'; });
            btn.addEventListener('click', function() { window.location.href = p[0]; });
            panel.appendChild(btn);
          });

          nav.insertBefore(panel, toggle);
          toggle.addEventListener('click', function() {
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
          });

          document.body.appendChild(nav);
        });
      }
    </script>
  </body>
</html>
